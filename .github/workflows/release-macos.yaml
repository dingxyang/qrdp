name: Release macOS App
run-name: ${{ github.event.release.tag_name || github.event.inputs.tag }}

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag'
        required: true
        default: '0.0.1'

env:
  FREERDP_TAG: "3.12.0"

jobs:
  release-arm64:
    name: Release macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Normalise version tag
        id: normalise_version
        shell: bash
        run: |
          if [ "${{ github.event.release.tag_name }}" == "" ]; then
            version=$(echo ${{ github.event.inputs.tag }} | sed -e 's/v//g')
          else
            version=$(echo ${{ github.event.release.tag_name }} | sed -e 's/v//g')
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install FreeRDP via Homebrew
        shell: bash
        run: |
          brew install freerdp
          echo "FreeRDP version: $(brew list --versions freerdp)"

      - name: Install wails
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend assets
        shell: bash
        run: |
          jq '.info.productVersion = "${{ steps.normalise_version.outputs.version }}"' wails.json > tmp.json
          mv tmp.json wails.json
          cd frontend
          jq '.version = "${{ steps.normalise_version.outputs.version }}"' package.json > tmp.json
          mv tmp.json package.json
          npm install

      - name: Build wails app for macOS arm64
        shell: bash
        run: |
          FREERDP_PREFIX="$(brew --prefix freerdp)"
          export DYLD_LIBRARY_PATH="${FREERDP_PREFIX}/lib:${DYLD_LIBRARY_PATH:-}"
          CGO_ENABLED=1 wails build -clean -platform darwin/arm64 \
            -ldflags "-X main.version=${{ steps.normalise_version.outputs.version }}"

      - name: Create DMG
        shell: bash
        working-directory: ./build/bin
        run: |
          APP_NAME="QRDP.app"
          DMG_NAME="QRDP_${{ steps.normalise_version.outputs.version }}_mac_arm64.dmg"
          hdiutil create -volname "QRDP" -srcfolder "${APP_NAME}" -ov -format UDZO "${DMG_NAME}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.normalise_version.outputs.version }}
          files: ./build/bin/QRDP_${{ steps.normalise_version.outputs.version }}_mac_arm64.dmg
          token: ${{ secrets.GITHUB_TOKEN }}

  release-amd64:
    name: Release macOS (Intel)
    runs-on: macos-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Normalise version tag
        id: normalise_version
        shell: bash
        run: |
          if [ "${{ github.event.release.tag_name }}" == "" ]; then
            version=$(echo ${{ github.event.inputs.tag }} | sed -e 's/v//g')
          else
            version=$(echo ${{ github.event.release.tag_name }} | sed -e 's/v//g')
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install build dependencies
        shell: bash
        run: |
          brew install cmake pkg-config

      - name: Build OpenSSL for x86_64
        shell: bash
        run: |
          OPENSSL_VERSION="3.3.1"
          OPENSSL_INSTALL="${GITHUB_WORKSPACE}/openssl-x86_64"

          curl -fsSL "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/openssl-${OPENSSL_VERSION}.tar.gz" \
            | tar xz -C /tmp
          cd "/tmp/openssl-${OPENSSL_VERSION}"

          ./Configure darwin64-x86_64-cc \
            --prefix="${OPENSSL_INSTALL}" \
            no-shared no-tests no-docs
          make -j$(sysctl -n hw.ncpu)
          make install_sw

          echo "OpenSSL x86_64 installed to ${OPENSSL_INSTALL}"
          file "${OPENSSL_INSTALL}/lib/libssl.a"

      - name: Build FreeRDP from source for x86_64
        shell: bash
        run: |
          FREERDP_SRC="${GITHUB_WORKSPACE}/src/FreeRDP"
          FREERDP_BUILD="${GITHUB_WORKSPACE}/build/freerdp-darwin-amd64"
          FREERDP_INSTALL="${GITHUB_WORKSPACE}/install"
          OPENSSL_INSTALL="${GITHUB_WORKSPACE}/openssl-x86_64"

          rm -rf "${FREERDP_SRC}"
          git init "${FREERDP_SRC}"
          git -C "${FREERDP_SRC}" remote add origin https://github.com/FreeRDP/FreeRDP.git
          git -C "${FREERDP_SRC}" fetch --depth 1 origin "refs/tags/${FREERDP_TAG}:refs/tags/${FREERDP_TAG}"
          git -C "${FREERDP_SRC}" checkout -q "tags/${FREERDP_TAG}"

          mkdir -p "${FREERDP_BUILD}" "${FREERDP_INSTALL}"
          cd "${FREERDP_BUILD}"

          # Build tools run natively on the arm64 GitHub runner.
          # The output architecture is controlled by CMake/clang flags below.
          cmake "${FREERDP_SRC}" \
            -DCMAKE_INSTALL_PREFIX="${FREERDP_INSTALL}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DOPENSSL_ROOT_DIR="${OPENSSL_INSTALL}" \
            -DWITH_CUPS=OFF \
            -DWITH_WAYLAND=OFF \
            -DWITH_PULSE=OFF \
            -DWITH_FFMPEG=OFF \
            -DWITH_SWSCALE=OFF \
            -DWITH_DSP_FFMPEG=OFF \
            -DWITH_FUSE=OFF \
            -DWITH_GSTREAMER_1_0=OFF \
            -DWITH_CLIENT=OFF \
            -DWITH_SERVER=OFF \
            -DBUILD_TESTING=OFF \
            -DCHANNEL_URBDRC=OFF \
            -DWITH_KRB5=OFF \
            -DWITH_PCSC=OFF \
            -DWITH_ALSA=OFF \
            -DWITH_X11=OFF \
            -DWITH_MANPAGES=OFF

          cmake --build . -- -j$(sysctl -n hw.ncpu)
          cmake --install .

          echo "FreeRDP x86_64 installed to ${FREERDP_INSTALL}"
          file "${FREERDP_INSTALL}/lib/libfreerdp3.dylib"

      - name: Install wails
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend assets
        shell: bash
        run: |
          jq '.info.productVersion = "${{ steps.normalise_version.outputs.version }}"' wails.json > tmp.json
          mv tmp.json wails.json
          cd frontend
          jq '.version = "${{ steps.normalise_version.outputs.version }}"' package.json > tmp.json
          mv tmp.json package.json
          npm install

      - name: Generate wails bindings (host arm64)
        shell: bash
        run: |
          wails generate module

      - name: Build wails app for macOS amd64
        shell: bash
        run: |
          FREERDP_INSTALL="${GITHUB_WORKSPACE}/install"
          OPENSSL_INSTALL="${GITHUB_WORKSPACE}/openssl-x86_64"
          export PKG_CONFIG_PATH="${FREERDP_INSTALL}/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          export DYLD_LIBRARY_PATH="${FREERDP_INSTALL}/lib:${DYLD_LIBRARY_PATH:-}"
          export CGO_CFLAGS="-arch x86_64 -mmacosx-version-min=11.0"
          export CGO_LDFLAGS="-arch x86_64 -mmacosx-version-min=11.0 -L${FREERDP_INSTALL}/lib -L${OPENSSL_INSTALL}/lib"
          GOARCH=amd64 CGO_ENABLED=1 wails build -clean -skipbindings -platform darwin/amd64 \
            -ldflags "-X main.version=${{ steps.normalise_version.outputs.version }}"

      - name: Create DMG
        shell: bash
        working-directory: ./build/bin
        run: |
          APP_NAME="QRDP.app"
          DMG_NAME="QRDP_${{ steps.normalise_version.outputs.version }}_mac_intel.dmg"
          hdiutil create -volname "QRDP" -srcfolder "${APP_NAME}" -ov -format UDZO "${DMG_NAME}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.normalise_version.outputs.version }}
          files: ./build/bin/QRDP_${{ steps.normalise_version.outputs.version }}_mac_intel.dmg
          token: ${{ secrets.GITHUB_TOKEN }}
